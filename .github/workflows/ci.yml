name: CI

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Upgrade npm
              run: npm install -g npm@11

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npm run lint:js

            - name: Run Stylelint
              run: npm run lint:css

            - name: Check Prettier formatting
              run: npm run format:check

            - name: TypeScript type check
              run: npm run typecheck

            - name: Run unit tests
              run: npm run test:unit

    test:
        name: E2E Tests
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Upgrade npm
              run: npm install -g npm@11

            - name: Install dependencies
              run: npm ci

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium firefox

            - name: Create data directory
              run: mkdir -p data

            - name: Run E2E tests
              run: npx playwright test --update-snapshots
              env:
                  CI: true
                  NODE_CONFIG: '{"betterAuthSecret":"ci-test-secret-key-not-used-in-production","databasePath":"./data/test.db"}'

            - name: Commit new Linux snapshots
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  find test/e2e -name "*-linux.png" -exec git add {} +
                  if git diff --staged --quiet; then
                    echo "No new snapshots to commit"
                  else
                    git commit -m "Add Linux Playwright snapshots [skip ci]"
                    git push
                  fi

            - name: Upload Playwright report
              uses: actions/upload-artifact@v4
              if: always()
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 7
